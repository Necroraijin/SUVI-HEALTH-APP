<!DOCTYPE html>

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 30px -5px rgba(255, 182, 148, 0.15), inset 1px 1px 0 0 rgba(255, 255, 255, 0.2);
        }
        
        .core-orb {
            background: radial-gradient(circle at center, #FFD2A8 0%, rgba(255, 157, 110, 0.8) 50%, rgba(246, 229, 223, 0) 100%);
            animation: pulse 4s infinite ease-in-out alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 40px rgba(255, 157, 110, 0.3); }
            100% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 60px rgba(255, 157, 110, 0.6); }
        }

        .bg-gradient-cloud {
            background: radial-gradient(circle at top left, rgba(255, 218, 214, 0.4) 0%, transparent 40%),
                        radial-gradient(circle at bottom right, rgba(255, 157, 110, 0.2) 0%, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen font-body-md bg-gradient-cloud overflow-x-hidden pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/40 dark:bg-black/20 backdrop-blur-3xl border-b border-white/30 shadow-[0_30px_30px_-5px_rgba(255,219,204,0.3)] hover:opacity-80 transition-opacity">
<div class="flex justify-between items-center px-gutter py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full overflow-hidden border-2 border-white/50 active:scale-95 transition-transform duration-200">
<img alt="User profile photo" class="w-full h-full object-cover" data-alt="A close-up portrait of a serene woman with a soft smile, bathed in warm, natural morning light. The image has a light, airy aesthetic with soft pastel tones, conveying a sense of calm and wellness, fitting the Aura Wellness app style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBzxFrsEHVSccEpLsMrHu4o5k8ZoreDwuo76Z4oXyFmHuSNi3_jXQLAhnCJ4Dw6eJFfV_HT3kC9wAh5uiNBPejrOuOItDWcSCyNyXhL9UqTabghutdurFq9HRsU6UVcEukdX5_jnkBTuK4WDIbAQCtq5cuGqJUQtDYx2ikS70kRFF0Y5amq8NFGloQToJCM5p1s1K8r8D6qLJkR3uYcyN7QHu07nhrl5UwbClAqWTpE1PzYY3gLhrVbpXglUug3MD1dgJMQvHmJ8bk"/>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary dark:text-primary-fixed">Suvi</h1>
</div>
<button class="text-primary dark:text-primary-fixed active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="notifications" style="font-variation-settings: 'FILL' 0;">notifications</span>
</button>
</div>
</header>
<main class="pt-[100px] px-gutter max-w-3xl mx-auto space-y-stack-lg">
<!-- Cycle Visualization Core -->
<section class="flex flex-col items-center justify-center relative py-12">
<div class="absolute inset-0 core-orb -z-10 rounded-full opacity-50 blur-3xl w-64 h-64 mx-auto"></div>
<div class="relative w-64 h-64 rounded-full border-4 border-white/40 shadow-inner flex flex-col items-center justify-center bg-white/20 backdrop-blur-md">
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 100 100">
<!-- Background circle -->
<circle cx="50" cy="50" fill="none" r="46" stroke="rgba(255,255,255,0.3)" stroke-width="4"></circle>
<!-- Progress arc (Follicular phase approx day 8/28 -> ~28%) -->
<circle class="transform -rotate-90 origin-center transition-all duration-1000" cx="50" cy="50" fill="none" r="46" stroke="#FF9D6E" stroke-dasharray="289" stroke-dashoffset="208" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<div class="text-center z-10 flex flex-col items-center gap-1">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Day 8</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Follicular Phase</span>
</div>
</div>
</section>
<!-- Suvi Insight -->
<section class="glass-card rounded-3xl p-6 relative overflow-hidden">
<div class="absolute -top-4 -right-4 w-24 h-24 bg-primary-container rounded-full opacity-20 blur-2xl"></div>
<div class="flex gap-4 items-start relative z-10">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-secondary" data-icon="auto_awesome">auto_awesome</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Phase Insight</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Your energy levels are rising. Great time for that high-intensity workout you planned.</p>
</div>
</div>
</section>
<!-- Bento Grid for Tracking -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Cycle Prediction -->
<section class="glass-card rounded-3xl p-6 flex flex-col justify-between h-full">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary" data-icon="calendar_month">calendar_month</span>
<h3 class="font-headline-md text-headline-md text-on-surface">Next Period</h3>
</div>
<div>
<div class="font-display-lg text-display-lg text-primary mb-1">Oct 12</div>
<div class="font-body-sm text-label-sm text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="info">info</span>
                        Predicted range: Oct 12 - Oct 14
                    </div>
</div>
</section>
<!-- Log Symptoms Quick Actions -->
<section class="glass-card rounded-3xl p-6 h-full flex flex-col">
<div class="flex justify-between items-center mb-4">
<h3 class="font-headline-md text-headline-md text-on-surface">Log Today</h3>
<button class="text-primary hover:text-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</button>
</div>
<div class="grid grid-cols-4 gap-3 mt-auto">
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="water_drop">water_drop</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Flow</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="mood">mood</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Mood</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="sick">sick</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Pain</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="hotel">hotel</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Sleep</span>
</button>
</div>
</section>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container-low/60 dark:bg-surface-container-highest/20 backdrop-blur-3xl shadow-[0_-10px_30px_-5px_rgba(255,182,148,0.2)] md:hidden">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-4 py-1 hover:text-primary dark:hover:text-primary-fixed transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="calendar_today">calendar_today</span>
<span class="font-label-sm text-label-sm">Today</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-1 hover:text-primary dark:hover:text-primary-fixed transition-colors active:scale-90 transition-transform duration-300 ease-out">
<span class="material-symbols-outlined mb-1" data-icon="target">target</span>
<span class="font-label-sm text-label-sm">Goals</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-4 py-1 hover:text-primary dark:hover:text-primary-fixed transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label-sm text-label-sm">Chat</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-4 py-1 hover:text-primary dark:hover:text-primary-fixed transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</button>
</div>
</nav>
</body></html>
