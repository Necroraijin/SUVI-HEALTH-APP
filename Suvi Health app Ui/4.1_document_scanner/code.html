<html lang="en"><head>

              "spacing": {
                      "unit": "4px",
                      "gutter": "16px",
                      "stack-sm": "8px",
                      "stack-md": "16px",
                      "stack-lg": "32px",
                      "container-padding": "24px"
              },
              "fontFamily": {

                      "body-md": [

<style>
        .sunset-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 157, 110, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 157, 110, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 157, 110, 0); }
        }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-surface font-body-md h-screen w-full overflow-hidden relative">
<!-- Camera Viewfinder Background -->
<div class="absolute inset-0 z-0">
<img alt="Camera feed" class="w-full h-full object-cover" data-alt="A top-down, first-person perspective view of a neatly organized desk with a slightly crumpled white paper document resting in the center, waiting to be scanned. The desk has a warm, light oak wood texture. A sleek pen and a small ceramic cup sit near the top edge. Warm, diffused natural sunlight streams in from the side, creating soft, elegant shadows that fit perfectly within a serene, wellness-focused application context." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUDX3MREl33G-RylJBTIKfg2E5yIKOghUccbJDRDb0jXrXG3enLmTeD79RYezoqiyukPu2PVdnpFB_FwV0sGAeK0q_7o1mVkO_ylc4OgZ3YZuHBjsMeDJhT_QIamrw093Zpy9cR2Hk20A6Qnti2dLenAVEWQRFqkk9bumugV4CG3dXaXLtuFTl3QPE_glYvGFUfVEqHbcfFQr4UZYCIMvpbrHe3XZuFjVzd_815AVofkkPEANvE3zXxXJSYO_vYQV3jlIBkXtkb2g"/>
<!-- Subtle dark overlay to ensure UI elements pop -->
<div class="absolute inset-0 bg-black/30"></div>
</div>
<!-- Header Overlay -->
<header class="absolute top-0 left-0 w-full z-20 flex justify-between items-center px-container-padding py-6 pt-12 bg-gradient-to-b from-black/60 to-transparent">
<button class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-xl border border-white/30 flex items-center justify-center text-white shadow-sm hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-white tracking-tight text-shadow-sm">Scan Document</h1>
<button class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-xl border border-white/30 flex items-center justify-center text-white shadow-sm hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
</button>
</header>
<!-- Document Guide Overlay -->
<main class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none px-8">
<!-- Soft-edged glass document guide -->
<div class="w-full aspect-[3/4] max-h-[618px] rounded-2xl border-[1.5px] border-white/60 bg-white/5 backdrop-blur-[2px] shadow-[0_0_40px_rgba(255,255,255,0.15)] relative">
<!-- Corner markers to emphasize scanning area -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-2xl -ml-[2px] -mt-[2px]"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-2xl -mr-[2px] -mt-[2px]"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-2xl -ml-[2px] -mb-[2px]"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-2xl -mr-[2px] -mb-[2px]"></div>
<!-- Scanning line animation (optional subtle effect) -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary-container/80 blur-[1px] opacity-50 shadow-[0_0_10px_#ff9d6e] translate-y-1/2"></div>
</div>
</main>
<!-- Bottom Controls Overlay -->
<footer class="absolute bottom-0 left-0 w-full z-20 pb-12 pt-16 px-container-padding flex justify-between items-center bg-gradient-to-t from-black/80 via-black/40 to-transparent">
<!-- Gallery Button (Glassmorphism) -->
<button class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-2xl border border-white/20 flex flex-col items-center justify-center text-white shadow-sm hover:bg-white/20 transition-all active:scale-95">
<span class="material-symbols-outlined mb-0.5 text-[24px]" data-icon="photo_library">photo_library</span>
</button>
<!-- The "Sunset Core" Capture Button -->
<div class="relative w-24 h-24 flex items-center justify-center">
<!-- Outer translucent ring -->
<div class="absolute inset-0 rounded-full border-4 border-white/40 backdrop-blur-md"></div>
<!-- Inner glowing core -->
<button class="w-16 h-16 rounded-full bg-gradient-to-tr from-[#FFD2A8] to-primary-container shadow-[0_0_30px_rgba(255,157,110,0.6)] flex items-center justify-center sunset-pulse active:scale-90 transition-transform duration-150">
<!-- Empty core, serves as the shutter button -->
</button>
</div>
<!-- Auto/Manual Toggle (Placeholder for symmetry) -->
<button class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-2xl border border-white/20 flex flex-col items-center justify-center text-white shadow-sm hover:bg-white/20 transition-all active:scale-95">
<span class="font-label-sm text-label-sm tracking-wider uppercase opacity-90 text-[10px]">Auto</span>
</button>
</footer>
</body></html>
