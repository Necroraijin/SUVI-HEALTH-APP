<!DOCTYPE html>

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            overflow-x: hidden;
        }

        /* Aurora Background Setup */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: linear-gradient(135deg, rgba(0, 54, 58, 0.4) 0%, rgba(50, 0, 71, 0.4) 100%);
            overflow: hidden;
        }

        .aurora-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 { width: 60vw; height: 60vw; top: -10%; left: -10%; background: radial-gradient(circle, rgba(0, 219, 231, 0.3) 0%, transparent 70%); animation-delay: 0s; }
        .orb-2 { width: 70vw; height: 70vw; bottom: -20%; right: -10%; background: radial-gradient(circle, rgba(207, 92, 255, 0.2) 0%, transparent 70%); animation-delay: -5s; }
        .orb-3 { width: 50vw; height: 50vw; top: 30%; left: 40%; background: radial-gradient(circle, rgba(116, 245, 255, 0.2) 0%, transparent 70%); animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 5%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.2);
            border-left-color: rgba(255, 255, 255, 0.2);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: theme('colors.primary');
            box-shadow: inset 0 0 10px rgba(0, 219, 231, 0.1);
            outline: none;
        }

        .lumi-btn {
            background: linear-gradient(135deg, theme('colors.primary-fixed-dim'), theme('colors.secondary-container'));
            box-shadow: 0 0 20px rgba(0, 219, 231, 0.3);
            transition: all 0.3s ease;
        }
        .lumi-btn:hover {
            box-shadow: 0 0 30px rgba(207, 92, 255, 0.5);
            transform: translateY(-2px);
        }

        .chip-inactive {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: theme('colors.on-surface');
            transition: all 0.3s ease;
        }
        .chip-active {
            background: rgba(207, 92, 255, 0.2);
            border: 1px solid theme('colors.secondary-container');
            color: theme('colors.secondary-fixed');
            box-shadow: 0 0 15px rgba(207, 92, 255, 0.2);
        }

        /* Hide Nav Shell per Instructions for Transactional/Onboarding */
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex flex-col relative">
<!-- Ambient Background -->
<div class="aurora-bg">
<div class="aurora-orb orb-1"></div>
<div class="aurora-orb orb-2"></div>
<div class="aurora-orb orb-3"></div>
</div>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col px-container-margin-mobile md:px-container-margin-desktop py-8 md:py-12 relative z-10 max-w-3xl mx-auto w-full">
<!-- Header Section -->
<header class="mb-stack-lg text-center mt-8">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-unit">I'll tailor my care based on your history.</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Let's build your medical context to ensure safe and personalized interactions.</p>
</header>
<!-- Search & Selection Area -->
<section class="glass-panel rounded-xl p-stack-md mb-stack-lg flex flex-col gap-stack-md">
<!-- Search Input -->
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="glass-input w-full rounded-full py-4 pl-12 pr-4 text-on-surface font-body-md text-body-md placeholder-on-surface-variant/50 focus:ring-0" placeholder="Search conditions, allergies, or medications..." type="text"/>
</div>
<!-- Categories -->
<div class="flex flex-col gap-stack-sm">
<!-- Common Conditions -->
<div>
<h3 class="font-label-md text-label-md text-tertiary-fixed-dim mb-unit uppercase tracking-wider">Common Conditions</h3>
<div class="flex flex-wrap gap-2">
<button class="chip-active rounded-full px-4 py-2 font-body-md text-body-md flex items-center gap-2">
<span>Hypertension</span>
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
<button class="chip-inactive rounded-full px-4 py-2 font-body-md text-body-md hover:bg-white/10">Asthma</button>
<button class="chip-inactive rounded-full px-4 py-2 font-body-md text-body-md hover:bg-white/10">Diabetes Type 2</button>
</div>
</div>
<!-- Known Allergies -->
<div class="mt-4">
<h3 class="font-label-md text-label-md text-tertiary-fixed-dim mb-unit uppercase tracking-wider">Known Allergies</h3>
<div class="flex flex-wrap gap-2">
<button class="chip-inactive rounded-full px-4 py-2 font-body-md text-body-md hover:bg-white/10">Penicillin</button>
<button class="chip-inactive rounded-full px-4 py-2 font-body-md text-body-md hover:bg-white/10">Peanuts</button>
<button class="chip-inactive rounded-full px-4 py-2 font-body-md text-body-md hover:bg-white/10">Latex</button>
</div>
</div>
</div>
</section>
<!-- Quick Action: Scan -->
<section class="mb-stack-lg">
<button class="w-full glass-panel rounded-xl p-stack-md flex flex-col items-center justify-center gap-unit group hover:bg-white/5 transition-colors border border-primary/20 hover:border-primary/50 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-r from-primary/0 via-primary/5 to-primary/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-2 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 0;">document_scanner</span>
</div>
<span class="font-headline-md text-headline-md text-primary">Scan Prescription</span>
<span class="font-body-md text-body-md text-on-surface-variant text-center max-w-sm">Quickly add medications by scanning your pill bottles or documents.</span>
</button>
</section>
<!-- Bottom Actions (Floating) -->
<div class="mt-auto pt-stack-md pb-8 flex flex-col items-center gap-stack-sm w-full">
<button class="lumi-btn w-full md:w-auto md:min-w-[240px] rounded-full py-4 px-8 font-label-md text-label-md text-on-primary text-center">
                Continue
            </button>
<button class="text-on-surface-variant font-body-md text-body-md hover:text-primary transition-colors py-2">
                Skip for now
            </button>
</div>
</main>
<script>
        // Simple chip interaction logic for demonstration
        document.querySelectorAll('button[class*="chip-"]').forEach(chip => {
            chip.addEventListener('click', function() {
                // In a real app, this would be more robust to handle the 'close' icon specifically
                if (this.classList.contains('chip-inactive')) {
                    this.classList.remove('chip-inactive', 'hover:bg-white/10');
                    this.classList.add('chip-active');
                    // Add close icon
                    if (!this.querySelector('.material-symbols-outlined')) {
                        this.innerHTML += '<span class="material-symbols-outlined text-[16px] ml-2">close</span>';
                        this.classList.add('flex', 'items-center', 'justify-between');
                    }
                } else if (this.classList.contains('chip-active')) {
                    this.classList.remove('chip-active', 'flex', 'items-center', 'justify-between');
                    this.classList.add('chip-inactive', 'hover:bg-white/10');
                    // Remove close icon
                    const icon = this.querySelector('.material-symbols-outlined');
                    if (icon) icon.remove();
                }
            });
        });
    </script>
</body></html>
