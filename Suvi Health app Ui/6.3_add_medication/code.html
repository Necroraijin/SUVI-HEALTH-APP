<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aura Wellness - Add Medication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&amp;family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#efb9b9",
                    "surface-bright": "#fff8f6",
                    "secondary": "#7d5354",
                    "on-error-container": "#93000a",
                    "surface-dim": "#e8d6d1",
                    "on-primary-fixed-variant": "#77320b",
                    "on-secondary": "#ffffff",
                    "primary-fixed": "#ffdbcc",
                    "tertiary-fixed": "#e8def8",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed": "#351000",
                    "on-tertiary-container": "#4a4459",
                    "on-surface": "#221a16",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface-container": "#fceae4",
                    "surface-container-high": "#f6e5df",
                    "inverse-primary": "#ffb694",
                    "on-secondary-fixed": "#301214",
                    "error": "#ba1a1a",
                    "background": "#fff8f6",
                    "primary": "#954921",
                    "inverse-surface": "#382e2a",
                    "primary-fixed-dim": "#ffb694",
                    "outline": "#87736a",
                    "on-secondary-fixed-variant": "#633c3d",
                    "on-tertiary-fixed": "#1e192b",
                    "tertiary-fixed-dim": "#ccc2dc",
                    "surface": "#fff8f6",
                    "surface-variant": "#f0dfd9",
                    "secondary-container": "#fec7c7",
                    "tertiary-container": "#bbb2cb",
                    "on-primary": "#ffffff",
                    "surface-tint": "#954921",
                    "outline-variant": "#dac1b7",
                    "on-background": "#221a16",
                    "primary-container": "#ff9d6e",
                    "on-primary-container": "#77320b",
                    "on-secondary-container": "#7a5051",
                    "inverse-on-surface": "#ffede7",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#ffdad9",
                    "on-tertiary-fixed-variant": "#4a4458",
                    "surface-container-highest": "#f0dfd9",
                    "on-surface-variant": "#54433b",
                    "surface-container-low": "#fff1ec",
                    "tertiary": "#625b71"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-md": "16px",
                    "container-padding": "24px",
                    "stack-sm": "8px",
                    "unit": "4px",
                    "gutter": "16px",
                    "stack-lg": "32px"
            },
            "fontFamily": {
                    "label-sm": [
                            "Lexend"
                    ],
                    "headline-lg-mobile": [
                            "Bodoni Moda"
                    ],
                    "headline-md": [
                            "Bodoni Moda"
                    ],
                    "body-md": [
                            "Lexend"
                    ],
                    "display-lg": [
                            "Bodoni Moda"
                    ],
                    "body-lg": [
                            "Lexend"
                    ],
                    "headline-lg": [
                            "Bodoni Moda"
                    ]
            },
            "fontSize": {
                    "label-sm": [
                            "12px",
                            {
                                    "lineHeight": "1.4",
                                    "letterSpacing": "0.05em",
                                    "fontWeight": "500"
                            }
                    ],
                    "headline-lg-mobile": [
                            "28px",
                            {
                                    "lineHeight": "1.2",
                                    "fontWeight": "500"
                            }
                    ],
                    "headline-md": [
                            "24px",
                            {
                                    "lineHeight": "1.3",
                                    "fontWeight": "500"
                            }
                    ],
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "1.5",
                                    "fontWeight": "400"
                            }
                    ],
                    "display-lg": [
                            "48px",
                            {
                                    "lineHeight": "1.1",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "600"
                            }
                    ],
                    "body-lg": [
                            "18px",
                            {
                                    "lineHeight": "1.6",
                                    "fontWeight": "400"
                            }
                    ],
                    "headline-lg": [
                            "32px",
                            {
                                    "lineHeight": "1.2",
                                    "fontWeight": "500"
                            }
                    ]
            }
          },
        }
      }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            background-image: radial-gradient(circle at 50% -20%, rgba(255, 210, 168, 0.4) 0%, rgba(255, 248, 246, 0) 50%);
            min-height: 100vh;
        }
        
        /* Soft Tactility Styles */
        .glass-card {
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px -5px rgba(149, 73, 33, 0.05), inset -1px -1px 3px rgba(149, 73, 33, 0.02);
        }
        
        .minimal-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid theme('colors.surface-variant');
            border-radius: 0;
            padding: theme('spacing.stack-sm') 0;
            transition: border-color 0.3s ease;
        }
        
        .minimal-input:focus {
            outline: none;
            border-bottom-color: theme('colors.primary');
            box-shadow: none;
        }
        
        .minimal-input::placeholder {
            color: theme('colors.outline-variant');
        }

        /* Pill Button */
        .btn-primary {
            background-color: theme('colors.primary');
            color: theme('colors.on-primary');
            box-shadow: 0 4px 15px -3px rgba(149, 73, 33, 0.3);
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px -3px rgba(149, 73, 33, 0.4);
        }

        /* Option Pill */
        .option-pill {
            background-color: rgba(248, 193, 193, 0.2);
            color: theme('colors.on-surface');
            transition: all 0.2s ease;
        }
        
        .option-pill.active {
            background-color: theme('colors.primary-container');
            color: theme('colors.on-primary-container');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background font-body-md antialiased overflow-x-hidden flex flex-col items-center">
<!-- Top App Bar (Task-focused page, so we keep a simplified back/close nav instead of full global nav as per semantic mandate) -->
<header class="w-full max-w-[1200px] flex justify-between items-center px-container-padding py-stack-md bg-transparent flat no shadows z-40 sticky top-0 backdrop-blur-xl bg-white/10">
<button aria-label="Go back" class="text-on-surface-variant hover:opacity-80 transition-opacity p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile md:font-headline-md md:text-headline-md text-primary font-bold">Add Medication</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="w-full max-w-2xl px-container-padding pb-stack-lg flex-1 flex flex-col mt-stack-md">
<!-- Suvi Guidance -->
<section class="mb-stack-lg flex items-start gap-gutter animate-fade-in-up">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center shrink-0 shadow-lg" style="box-shadow: 0 0 20px rgba(255, 157, 110, 0.4);">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<div class="glass-card rounded-2xl rounded-tl-none p-stack-md flex-1">
<p class="font-body-md text-body-md text-on-surface-variant">
                    "Tell me about your new medication, and I'll help you find the best time to take it."
                </p>
</div>
</section>
<!-- Conversational Form -->
<form class="flex flex-col gap-stack-lg">
<!-- Medication Name -->
<div class="glass-card rounded-2xl p-container-padding relative group">
<label class="block font-label-sm text-label-sm text-primary mb-stack-sm uppercase tracking-widest" for="med-name">Medication Name</label>
<input autocomplete="off" class="minimal-input w-full font-body-lg text-body-lg text-on-surface bg-transparent" id="med-name" placeholder="e.g. Amoxicillin" type="text"/>
<!-- Autocomplete Dropdown (Simulated) -->
<div class="absolute left-0 right-0 top-full mt-unit bg-surface-bright/95 backdrop-blur-3xl rounded-xl border border-white/40 shadow-2xl overflow-hidden z-20 hidden group-focus-within:block opacity-0 group-focus-within:opacity-100 transition-opacity duration-200">
<ul class="py-2">
<li class="px-container-padding py-3 hover:bg-surface-container cursor-pointer flex items-center gap-3">
<span class="material-symbols-outlined text-outline text-opacity-50">medication</span>
<span class="font-body-md text-body-md text-on-surface">Amoxicillin</span>
</li>
<li class="px-container-padding py-3 hover:bg-surface-container cursor-pointer flex items-center gap-3">
<span class="material-symbols-outlined text-outline text-opacity-50">medication</span>
<span class="font-body-md text-body-md text-on-surface">Amlodipine</span>
</li>
<li class="px-container-padding py-3 hover:bg-surface-container cursor-pointer flex items-center gap-3">
<span class="material-symbols-outlined text-outline text-opacity-50">medication</span>
<span class="font-body-md text-body-md text-on-surface">Atorvastatin</span>
</li>
</ul>
</div>
</div>
<!-- Dosage -->
<div class="glass-card rounded-2xl p-container-padding">
<label class="block font-label-sm text-label-sm text-primary mb-stack-sm uppercase tracking-widest" for="med-dosage">Dosage</label>
<div class="flex items-center gap-3">
<input class="minimal-input w-24 font-body-lg text-body-lg text-on-surface bg-transparent text-center" id="med-dosage" placeholder="500" type="number"/>
<select class="minimal-input flex-1 font-body-md text-body-md text-on-surface bg-transparent appearance-none cursor-pointer">
<option value="mg">mg</option>
<option value="ml">ml</option>
<option value="mcg">mcg</option>
<option value="pill">pill(s)</option>
</select>
</div>
</div>
<!-- Frequency -->
<div class="glass-card rounded-2xl p-container-padding">
<label class="block font-label-sm text-label-sm text-primary mb-stack-md uppercase tracking-widest">Frequency</label>
<div class="flex flex-wrap gap-stack-sm">
<button class="option-pill px-4 py-2 rounded-full font-label-sm text-label-sm" type="button">Once daily</button>
<button class="option-pill active px-4 py-2 rounded-full font-label-sm text-label-sm" type="button">Twice daily</button>
<button class="option-pill px-4 py-2 rounded-full font-label-sm text-label-sm" type="button">As needed</button>
<button class="option-pill px-4 py-2 rounded-full font-label-sm text-label-sm" type="button">Custom</button>
</div>
</div>
<!-- Timings (Conditional based on frequency, showing default 2 times for 'Twice daily') -->
<div class="glass-card rounded-2xl p-container-padding">
<label class="block font-label-sm text-label-sm text-primary mb-stack-md uppercase tracking-widest">Timings</label>
<div class="flex flex-col gap-stack-sm">
<div class="flex items-center justify-between p-3 rounded-xl bg-surface/50 border border-white/20">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">light_mode</span>
<span class="font-body-md text-body-md text-on-surface">Morning</span>
</div>
<input class="bg-transparent border-none text-primary font-medium focus:ring-0 cursor-pointer" type="time" value="08:00"/>
</div>
<div class="flex items-center justify-between p-3 rounded-xl bg-surface/50 border border-white/20">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
<span class="font-body-md text-body-md text-on-surface">Evening</span>
</div>
<input class="bg-transparent border-none text-primary font-medium focus:ring-0 cursor-pointer" type="time" value="20:00"/>
</div>
</div>
</div>
</form>
</main>
<!-- Bottom Action Area -->
<div class="w-full max-w-2xl px-container-padding py-stack-md sticky bottom-0 bg-gradient-to-t from-background via-background/90 to-transparent z-30">
<button class="btn-primary w-full py-4 rounded-full flex items-center justify-center gap-2">
<span class="font-label-sm text-label-sm uppercase tracking-widest">Next Step</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<script>
        // Simple script to handle pill toggling for demonstration
        document.querySelectorAll('.option-pill').forEach(pill => {
            pill.addEventListener('click', function() {
                const siblings = this.parentElement.querySelectorAll('.option-pill');
                siblings.forEach(s => s.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body></html>
