<style>
        body {
            background-color: #101415; /* surface */
            color: #e0e3e5; /* on-surface */
            overflow: hidden;
        }

        /* Liquid Aurora Background */
        .aurora-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(0, 219, 231, 0.15) 0%, transparent 50%), /* primary-fixed-dim tint */
                radial-gradient(circle at 20% 80%, rgba(236, 178, 255, 0.1) 0%, transparent 40%), /* secondary tint */
                radial-gradient(circle at 80% 20%, rgba(0, 242, 255, 0.1) 0%, transparent 40%); /* primary-container tint */
            filter: blur(60px);
            animation: rotateAurora 30s linear infinite;
            z-index: -1;
        }

        @keyframes rotateAurora {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Breathing Orb */
        .orb-container {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .orb-core {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #e1fdff 0%, #00f2ff 50%, #00696f 100%);
            box-shadow: 
                0 0 40px rgba(0, 242, 255, 0.6),
                inset -10px -10px 20px rgba(0, 54, 58, 0.5),
                inset 10px 10px 20px rgba(255, 255, 255, 0.8);
            animation: breatheCore 6s ease-in-out infinite;
            z-index: 2;
        }

        .orb-aura-1 {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 219, 231, 0.3) 0%, transparent 70%);
            animation: breatheAura1 6s ease-in-out infinite;
            z-index: 1;
        }

        .orb-aura-2 {
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236, 178, 255, 0.15) 0%, transparent 70%);
            animation: breatheAura2 6s ease-in-out infinite reverse;
            z-index: 0;
        }

        @keyframes breatheCore {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }

        @keyframes breatheAura1 {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        @keyframes breatheAura2 {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.15); opacity: 0.6; }
        }

        /* Glass Surface */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.2);
            border-left-color: rgba(255, 255, 255, 0.2);
        }

        /* Luminescent Button */
        .btn-luminescent {
            background: linear-gradient(135deg, #00f2ff, #cf5cff);
            color: #002022; /* on-primary-fixed */
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-luminescent:hover {
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        
        .btn-luminescent:active {
            transform: scale(0.98);
        }

        /* Entrance Animation */
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
