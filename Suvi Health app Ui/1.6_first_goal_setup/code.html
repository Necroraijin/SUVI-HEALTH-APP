<style>
        /* Northern Lights Fluid Background */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background-color: #101415; /* background */
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(0,219,231,0.15) 0%, rgba(0,0,0,0) 70%);
            top: -20%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 90vw;
            height: 90vw;
            background: radial-gradient(circle, rgba(207,92,255,0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            right: -20%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.95); }
        }

        /* Orb Breathing Animation */
        .orb-breathe {
            animation: breathe 4s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(225,253,255,0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 25px rgba(225,253,255,0.8); }
        }

        /* Glass Card Border */
        .glass-border {
            position: relative;
        }
        .glass-border::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #e1fdff; /* primary */
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 0 20px rgba(0,219,231,0.6);
            transition: transform 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #272a2c; /* surface-container-high */
            border-radius: 4px;
        }

<!-- Navigation Shell Suppressed as per logic: Linear/Transactional Onboarding screen -->
<script>
        // Interactive Slider Logic
        const slider = document.getElementById('goal-slider');
        const valueDisplay = document.getElementById('slider-value');
        const progressFill = document.getElementById('slider-progress');

        function updateSlider() {
            const val = slider.value;
            const min = slider.min ? slider.min : 0;
            const max = slider.max ? slider.max : 100;
            const percentage = ((val - min) / (max - min)) * 100;
            
            valueDisplay.textContent = val;
            progressFill.style.width = `${percentage}%`;
            
            // Add a subtle scale pop effect when moving
            valueDisplay.style.transform = 'scale(1.05)';
            setTimeout(() => {
                valueDisplay.style.transform = 'scale(1)';
            }, 100);
        }

        slider.addEventListener('input', updateSlider);
        
        // Initialize
        updateSlider();
    </script>
