<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Symptom Logger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&amp;family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#382e2a",
                        "inverse-on-surface": "#ffede7",
                        "on-error": "#ffffff",
                        "surface-container-low": "#fff1ec",
                        "surface-variant": "#f0dfd9",
                        "on-secondary-container": "#7a5051",
                        "secondary-fixed": "#ffdad9",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#77320b",
                        "secondary-fixed-dim": "#efb9b9",
                        "on-surface-variant": "#54433b",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#f0dfd9",
                        "surface-container-high": "#f6e5df",
                        "surface-container": "#fceae4",
                        "on-primary-fixed-variant": "#77320b",
                        "surface-tint": "#954921",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#1e192b",
                        "secondary": "#7d5354",
                        "on-tertiary-fixed-variant": "#4a4458",
                        "primary-fixed-dim": "#ffb694",
                        "tertiary-fixed": "#e8def8",
                        "tertiary": "#625b71",
                        "surface": "#fff8f6",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#633c3d",
                        "on-secondary-fixed": "#301214",
                        "surface-dim": "#e8d6d1",
                        "on-background": "#221a16",
                        "surface-bright": "#fff8f6",
                        "outline": "#87736a",
                        "tertiary-fixed-dim": "#ccc2dc",
                        "on-tertiary-container": "#4a4459",
                        "secondary-container": "#fec7c7",
                        "outline-variant": "#dac1b7",
                        "on-secondary": "#ffffff",
                        "background": "#fff8f6",
                        "error": "#ba1a1a",
                        "inverse-primary": "#ffb694",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#ff9d6e",
                        "on-primary-fixed": "#351000",
                        "on-surface": "#221a16",
                        "primary-fixed": "#ffdbcc",
                        "tertiary-container": "#bbb2cb",
                        "primary": "#954921"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "container-padding": "24px",
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "unit": "4px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "body-md": ["Lexend"],
                        "headline-md": ["Bodoni Moda"],
                        "headline-lg-mobile": ["Bodoni Moda"],
                        "display-lg": ["Bodoni Moda"],
                        "label-sm": ["Lexend"],
                        "headline-lg": ["Bodoni Moda"],
                        "body-lg": ["Lexend"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Custom styles for the glassy slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            border-radius: 50%;
            background: #ff9d6e; /* primary-container */
            cursor: pointer;
            margin-top: -12px; /* You need to specify a margin in Chrome, but in Firefox and IE it is automatic */
            box-shadow: 0 4px 15px rgba(255, 157, 110, 0.4), inset 0 2px 4px rgba(255,255,255,0.4);
            border: 2px solid white;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.5); /* translucent track */
            border-radius: 9999px;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }
        
        /* Hide scrollbar for cleaner look in the symptom picker */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-surface antialiased overflow-hidden h-screen w-screen relative">
<!-- Faux Home Screen Background Context (The Canvas) -->
<div class="absolute inset-0 z-0 bg-gradient-to-br from-surface-bright via-surface to-secondary-container/20">
<!-- Abstract gradient orbs -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary-container/30 blur-[100px]"></div>
<div class="absolute bottom-[20%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container/40 blur-[80px]"></div>
<!-- Mock Home Content -->
<div class="pt-20 px-container-padding opacity-40 transition-opacity duration-500" id="home-content">
<h1 class="font-display-lg text-display-lg text-primary mb-stack-lg">Good Morning,<br/>Suvi</h1>
<div class="bg-white/30 backdrop-blur-md rounded-2xl p-6 border border-white/40 shadow-[0_10px_30px_rgba(0,0,0,0.02)] h-40"></div>
</div>
</div>
<!-- Backdrop Dimmer -->
<div class="absolute inset-0 z-10 bg-inverse-surface/20 backdrop-blur-[4px] transition-all duration-500" id="backdrop"></div>
<!-- Bottom Sheet Overlay -->
<div class="absolute bottom-0 left-0 w-full z-20 bg-white/60 dark:bg-surface/60 backdrop-blur-2xl rounded-t-3xl border-t border-white/50 shadow-[0_-20px_60px_rgba(149,73,33,0.15)] flex flex-col h-[751px] transition-transform duration-500 translate-y-0" id="bottom-sheet">
<!-- Drag Handle & Inner Glow (Glassmorphism detail) -->
<div class="absolute inset-0 rounded-t-3xl pointer-events-none border-t border-l border-white/60 shadow-[inset_1px_1px_0px_rgba(255,255,255,0.4)]"></div>
<div class="w-full flex justify-center pt-3 pb-1 relative z-30">
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full"></div>
</div>
<!-- Header -->
<div class="px-container-padding pb-stack-md flex justify-between items-center relative z-30 border-b border-white/20">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-semibold tracking-tight">Log Symptoms</h2>
<button aria-label="Close" class="w-10 h-10 rounded-full bg-white/40 backdrop-blur-md flex items-center justify-center text-on-surface-variant hover:bg-white/60 transition-colors border border-white/50 shadow-sm">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto px-container-padding py-stack-lg space-y-stack-lg relative z-30 hide-scrollbar pb-32">
<!-- Search -->
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full bg-white/50 border border-white/60 text-on-surface rounded-full py-3 pl-12 pr-4 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary-container/50 focus:bg-white/70 transition-all shadow-[0_4px_15px_rgba(0,0,0,0.02)] placeholder:text-outline backdrop-blur-md" placeholder="Search symptoms..." type="text"/>
</div>
<!-- Symptom Picker (Grouped) -->
<div class="space-y-stack-md">
<!-- Group 1: Respiratory -->
<div>
<h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-stack-sm pl-1">Respiratory</h3>
<div class="flex flex-wrap gap-2">
<button class="bg-primary-container text-on-primary-container px-4 py-2 rounded-full font-body-md text-body-md shadow-sm border border-white/40 transition-colors flex items-center gap-1">
                            Cough <span class="material-symbols-outlined text-[16px]">check</span>
</button>
<button class="bg-white/40 hover:bg-white/60 text-on-surface border border-white/50 px-4 py-2 rounded-full font-body-md text-body-md shadow-sm transition-colors backdrop-blur-sm">
                            Shortness of Breath
                        </button>
<button class="bg-white/40 hover:bg-white/60 text-on-surface border border-white/50 px-4 py-2 rounded-full font-body-md text-body-md shadow-sm transition-colors backdrop-blur-sm">
                            Wheezing
                        </button>
</div>
</div>
<!-- Group 2: Neurological -->
<div>
<h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-stack-sm pl-1 mt-stack-md">Neurological</h3>
<div class="flex flex-wrap gap-2">
<button class="bg-white/40 hover:bg-white/60 text-on-surface border border-white/50 px-4 py-2 rounded-full font-body-md text-body-md shadow-sm transition-colors backdrop-blur-sm">
                            Headache
                        </button>
<button class="bg-white/40 hover:bg-white/60 text-on-surface border border-white/50 px-4 py-2 rounded-full font-body-md text-body-md shadow-sm transition-colors backdrop-blur-sm">
                            Dizziness
                        </button>
<button class="bg-primary-container text-on-primary-container px-4 py-2 rounded-full font-body-md text-body-md shadow-sm border border-white/40 transition-colors flex items-center gap-1">
                            Brain Fog <span class="material-symbols-outlined text-[16px]">check</span>
</button>
</div>
</div>
<!-- Group 3: Digestive -->
<div>
<h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-stack-sm pl-1 mt-stack-md">Digestive</h3>
<div class="flex flex-wrap gap-2">
<button class="bg-white/40 hover:bg-white/60 text-on-surface border border-white/50 px-4 py-2 rounded-full font-body-md text-body-md shadow-sm transition-colors backdrop-blur-sm">
                            Nausea
                        </button>
</div>
</div>
</div>
<!-- Divider -->
<div class="h-px w-full bg-gradient-to-r from-transparent via-outline-variant/30 to-transparent"></div>
<!-- Severity Slider -->
<div class="bg-white/30 backdrop-blur-xl rounded-2xl p-5 border border-white/40 shadow-[0_10px_30px_rgba(0,0,0,0.02)]">
<div class="flex justify-between items-end mb-4">
<label class="font-headline-md text-headline-md text-on-surface">Severity</label>
<span class="font-headline-md text-headline-md text-primary font-bold">4<span class="text-body-md font-normal text-outline">/10</span></span>
</div>
<div class="relative w-full pt-4 pb-2">
<input class="w-full" max="10" min="1" type="range" value="4"/>
<div class="flex justify-between w-full px-1 mt-2 font-label-sm text-label-sm text-outline-variant">
<span>Mild</span>
<span>Severe</span>
</div>
</div>
</div>
<!-- Duration Selector -->
<div>
<label class="block font-body-md text-body-md text-on-surface mb-stack-sm pl-1">Duration</label>
<div class="flex bg-white/40 backdrop-blur-md rounded-full p-1 border border-white/50 shadow-inner">
<button class="flex-1 py-2.5 rounded-full bg-primary text-on-primary font-body-md text-body-md shadow-md transition-all">Started Today</button>
<button class="flex-1 py-2.5 rounded-full text-on-surface-variant font-body-md text-body-md hover:text-on-surface transition-all">Ongoing</button>
</div>
</div>
<!-- Mood / Energy Icons -->
<div>
<label class="block font-body-md text-body-md text-on-surface mb-stack-sm pl-1">Current Energy</label>
<div class="flex justify-around items-center bg-white/30 backdrop-blur-xl rounded-2xl p-4 border border-white/40 shadow-[0_10px_30px_rgba(0,0,0,0.02)]">
<button class="flex flex-col items-center gap-1 group">
<div class="w-14 h-14 rounded-full bg-white/50 border border-white/60 flex items-center justify-center group-hover:bg-primary-container group-hover:text-on-primary-container transition-all shadow-sm">
<span class="material-symbols-outlined text-[32px] text-outline group-hover:text-primary" style="font-variation-settings: 'FILL' 0;">battery_0_bar</span>
</div>
<span class="font-label-sm text-label-sm text-outline group-hover:text-primary">Low</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<div class="w-14 h-14 rounded-full bg-primary-container border border-primary-fixed flex items-center justify-center text-on-primary-container shadow-[0_0_15px_rgba(255,157,110,0.4)]">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">battery_4_bar</span>
</div>
<span class="font-label-sm text-label-sm text-primary font-bold">Medium</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<div class="w-14 h-14 rounded-full bg-white/50 border border-white/60 flex items-center justify-center group-hover:bg-primary-container group-hover:text-on-primary-container transition-all shadow-sm">
<span class="material-symbols-outlined text-[32px] text-outline group-hover:text-primary" style="font-variation-settings: 'FILL' 0;">battery_full</span>
</div>
<span class="font-label-sm text-label-sm text-outline group-hover:text-primary">High</span>
</button>
</div>
</div>
<!-- Free Text Notes -->
<div>
<label class="block font-body-md text-body-md text-on-surface mb-stack-sm pl-1">Additional Notes</label>
<textarea class="w-full bg-white/40 backdrop-blur-md border border-white/60 text-on-surface rounded-2xl p-4 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary-container/50 focus:bg-white/60 transition-all shadow-sm placeholder:text-outline resize-none" placeholder="Describe how you are feeling..." rows="3"></textarea>
</div>
</div>
<!-- Fixed Footer with Submit Button -->
<div class="absolute bottom-0 left-0 w-full p-container-padding bg-gradient-to-t from-surface via-surface/90 to-transparent pt-12 pb-8 z-40 rounded-b-3xl">
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-headline-md text-headline-md shadow-[0_15px_30px_-5px_rgba(149,73,33,0.3)] hover:bg-surface-tint hover:scale-[0.98] transition-all duration-300 flex justify-center items-center gap-2 relative overflow-hidden group">
<!-- Button Inner Glow -->
<div class="absolute inset-0 rounded-full border border-white/30 pointer-events-none group-hover:border-white/50 transition-colors"></div>
                Submit to Suvi
                <span class="material-symbols-outlined text-[20px]">send</span>
</button>
</div>
</div>
</body></html>
