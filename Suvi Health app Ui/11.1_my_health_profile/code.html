        /* Base Glassmorphism Class for Cards */
        .glass-card {
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);

            position: relative;

        }

            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: inset 1px 1px 0 0 rgba(255, 255, 255, 0.2), inset -1px -1px 0 0 rgba(0,0,0,0.02);
