<body class="bg-background text-on-background font-body-md h-screen w-screen overflow-hidden flex flex-col relative">
<!-- Blurred Document Background -->
<div class="absolute inset-0 document-bg filter blur-[30px] opacity-60 scale-110" data-alt="A macro, softly blurred photograph of a medical document or prescription pad resting on a light, warm surface. The text is completely illegible due to the heavy depth of field and gaussian blur. The lighting is bright, soft, and warm, evoking a serene, modern wellness environment with subtle peachy-white tones."></div>
<!-- Heavy Glassmorphism Overlay -->
<div class="absolute inset-0 glass-overlay z-0"></div>
<!-- Top App Bar (Structural representation, hidden actions as it's a processing state) -->
<header class="relative z-10 flex justify-center items-center w-full px-container-padding h-16 pt-8">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile tracking-tight text-primary">Suvi</h1>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex flex-col items-center justify-center px-container-padding">
<!-- Ambient Background Glow behind Orb -->
<div class="absolute w-[150vw] h-[150vw] md:w-[60vw] md:h-[60vw] ambient-glow rounded-full pointer-events-none"></div>
<div class="flex flex-col items-center justify-center w-full max-w-md mx-auto space-y-stack-lg animate-float">
<!-- Title -->
<h2 class="font-headline-md text-headline-md text-on-background text-center z-20">
                Suvi is Thinking
            </h2>
<!-- The Sunset Core Orb -->
<div class="relative w-48 h-48 md:w-56 md:h-56 z-20 mt-stack-md mb-stack-lg">
<!-- Inner glow ring -->
<div class="absolute inset-2 border-[1px] border-white/20 rounded-full z-30 pointer-events-none"></div>
<!-- The Orb -->
<div class="w-full h-full rounded-full core-orb animate-orb-pulse"></div>
</div>
<!-- Cycling Status Text -->
<div class="h-12 flex items-center justify-center relative w-full overflow-hidden z-20">
<div class="absolute transition-opacity duration-1000 ease-in-out opacity-100" id="status-1">
<p class="font-body-md text-body-md text-on-surface-variant text-center">Reading your prescription...</p>
</div>
<div class="absolute transition-opacity duration-1000 ease-in-out opacity-0" id="status-2">
<p class="font-body-md text-body-md text-on-surface-variant text-center">Identifying medications...</p>
</div>
<div class="absolute transition-opacity duration-1000 ease-in-out opacity-0" id="status-3">
<p class="font-body-md text-body-md text-on-surface-variant text-center">Checking history for interactions...</p>
</div>
<div class="absolute transition-opacity duration-1000 ease-in-out opacity-0" id="status-4">
<p class="font-body-md text-body-md text-on-surface-variant text-center">Building your summary...</p>
</div>
</div>
</div>
</main>
<script>
        // Simple JS to cycle through status messages
        document.addEventListener('DOMContentLoaded', () => {
            const statuses = ['status-1', 'status-2', 'status-3', 'status-4'];
            let currentIndex = 0;

            setInterval(() => {
                // Fade out current
                const currentEl = document.getElementById(statuses[currentIndex]);
                if(currentEl) currentEl.style.opacity = '0';

                // Move to next
                currentIndex = (currentIndex + 1) % statuses.length;

                // Fade in next
                const nextEl = document.getElementById(statuses[currentIndex]);
                if(nextEl) nextEl.style.opacity = '1';
            }, 3000); // Change every 3 seconds
        });
    </script>
