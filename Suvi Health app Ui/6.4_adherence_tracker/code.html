<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Medication Adherence Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&amp;family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#efb9b9",
                        "surface-bright": "#fff8f6",
                        "secondary": "#7d5354",
                        "on-error-container": "#93000a",
                        "surface-dim": "#e8d6d1",
                        "on-primary-fixed-variant": "#77320b",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#ffdbcc",
                        "tertiary-fixed": "#e8def8",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#351000",
                        "on-tertiary-container": "#4a4459",
                        "on-surface": "#221a16",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container": "#fceae4",
                        "surface-container-high": "#f6e5df",
                        "inverse-primary": "#ffb694",
                        "on-secondary-fixed": "#301214",
                        "error": "#ba1a1a",
                        "background": "#fff8f6",
                        "primary": "#954921",
                        "inverse-surface": "#382e2a",
                        "primary-fixed-dim": "#ffb694",
                        "outline": "#87736a",
                        "on-secondary-fixed-variant": "#633c3d",
                        "on-tertiary-fixed": "#1e192b",
                        "tertiary-fixed-dim": "#ccc2dc",
                        "surface": "#fff8f6",
                        "surface-variant": "#f0dfd9",
                        "secondary-container": "#fec7c7",
                        "tertiary-container": "#bbb2cb",
                        "on-primary": "#ffffff",
                        "surface-tint": "#954921",
                        "outline-variant": "#dac1b7",
                        "on-background": "#221a16",
                        "primary-container": "#ff9d6e",
                        "on-primary-container": "#77320b",
                        "on-secondary-container": "#7a5051",
                        "inverse-on-surface": "#ffede7",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#ffdad9",
                        "on-tertiary-fixed-variant": "#4a4458",
                        "surface-container-highest": "#f0dfd9",
                        "on-surface-variant": "#54433b",
                        "surface-container-low": "#fff1ec",
                        "tertiary": "#625b71"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "container-padding": "24px",
                        "stack-sm": "8px",
                        "unit": "4px",
                        "gutter": "16px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "label-sm": ["Lexend"],
                        "headline-lg-mobile": ["Bodoni Moda"],
                        "headline-md": ["Bodoni Moda"],
                        "body-md": ["Lexend"],
                        "display-lg": ["Bodoni Moda"],
                        "body-lg": ["Lexend"],
                        "headline-lg": ["Bodoni Moda"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "500"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(149, 73, 33, 0.05);
            border-radius: 1.5rem;
        }
        .pebble-inner {
            box-shadow: inset 1px 1px 0px rgba(255, 255, 255, 0.2), inset -2px -2px 10px rgba(0,0,0,0.02);
        }
        .sunset-gradient {
            background: radial-gradient(circle at top right, #FFD2A8 0%, transparent 60%),
                        radial-gradient(circle at bottom left, #ffe4d6 0%, transparent 50%);
            background-color: var(--color-background);
        }
        .heatmap-cell {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .heatmap-cell:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(149, 73, 33, 0.15);
        }
        .heatmap-cell.active {
            transform: scale(1.15);
            border: 2px solid var(--color-primary);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="sunset-gradient text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="docked full-width top-0 backdrop-blur-xl bg-white/10 text-primary dark:text-inverse-primary font-headline-md text-headline-md-mobile flex justify-between items-center px-container-padding py-stack-md w-full z-40 sticky">
<button class="hover:opacity-80 transition-opacity flex items-center justify-center p-2 rounded-full hover:bg-surface-variant/50">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<div class="font-headline-md text-headline-md-mobile text-primary dark:text-primary-fixed tracking-tight">Aura Wellness</div>
<button class="hover:opacity-80 transition-opacity flex items-center justify-center p-2 rounded-full hover:bg-surface-variant/50 relative">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full"></span>
</button>
</header>
<main class="flex-grow flex flex-col items-center w-full max-w-[1200px] mx-auto px-container-padding py-stack-lg pb-32 md:pb-stack-lg">
<!-- Welcome & Score Section -->
<section class="w-full flex flex-col items-center mb-stack-lg animate-fade-in-up">
<h1 class="font-headline-lg text-headline-lg-mobile md:font-headline-lg text-on-surface mb-stack-sm text-center">Medication Adherence</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center mb-stack-lg">You're doing great, Rahul!</p>
<div class="glass-card pebble-inner relative w-48 h-48 rounded-full flex flex-col items-center justify-center mb-stack-md">
<!-- Inner glow ring -->
<div class="absolute inset-2 rounded-full border border-white/40"></div>
<!-- Progress Arc (Simulated with SVG) -->
<svg class="absolute inset-0 w-full h-full -rotate-90" viewbox="0 0 100 100">
<circle class="text-surface-variant" cx="50" cy="50" fill="none" r="46" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary-container drop-shadow-md" cx="50" cy="50" fill="none" r="46" stroke="currentColor" stroke-dasharray="289" stroke-dashoffset="17" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="relative z-10 flex flex-col items-center">
<span class="font-display-lg text-display-lg text-primary tracking-tighter">94<span class="text-3xl">%</span></span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mt-1">Weekly Score</span>
</div>
</div>
</section>
<!-- Calendar Heat Map -->
<section class="w-full max-w-md mb-stack-lg">
<div class="glass-card pebble-inner p-stack-md">
<div class="flex justify-between items-center mb-stack-md">
<h2 class="font-headline-md text-headline-md-mobile text-on-surface">This Week</h2>
<button class="text-primary hover:opacity-80 transition-opacity font-label-sm text-label-sm flex items-center gap-1">
                        View Month <span class="material-symbols-outlined text-sm">chevron_right</span>
</button>
</div>
<div class="grid grid-cols-7 gap-2 mb-2 text-center font-label-sm text-label-sm text-on-surface-variant/70">
<div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div>
</div>
<div class="grid grid-cols-7 gap-2">
<!-- Green: All taken -->
<div class="aspect-square rounded-full bg-[#E5F5E0] flex items-center justify-center text-on-surface font-body-md text-body-md heatmap-cell shadow-sm" onclick="selectDay(this, 'Mon')">12</div>
<div class="aspect-square rounded-full bg-[#E5F5E0] flex items-center justify-center text-on-surface font-body-md text-body-md heatmap-cell shadow-sm" onclick="selectDay(this, 'Tue')">13</div>
<!-- Amber: Partial -->
<div class="aspect-square rounded-full bg-[#FFF3E0] flex items-center justify-center text-on-surface font-body-md text-body-md heatmap-cell shadow-sm" onclick="selectDay(this, 'Wed')">14</div>
<!-- Green: All taken -->
<div class="aspect-square rounded-full bg-[#E5F5E0] flex items-center justify-center text-on-surface font-body-md text-body-md heatmap-cell shadow-sm" onclick="selectDay(this, 'Thu')">15</div>
<!-- Red: Missed -->
<div class="aspect-square rounded-full bg-error-container text-on-error-container flex items-center justify-center font-body-md text-body-md heatmap-cell shadow-sm" onclick="selectDay(this, 'Fri')">16</div>
<!-- Active/Today -->
<div class="aspect-square rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-body-md text-body-md heatmap-cell shadow-sm active" onclick="selectDay(this, 'Sat')">17</div>
<!-- Future -->
<div class="aspect-square rounded-full bg-surface-variant/30 flex items-center justify-center text-on-surface-variant/50 font-body-md text-body-md heatmap-cell cursor-default">18</div>
</div>
<!-- Legend -->
<div class="flex justify-center gap-4 mt-stack-md font-label-sm text-label-sm text-on-surface-variant">
<div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-[#E5F5E0]"></span> All</div>
<div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-[#FFF3E0]"></span> Partial</div>
<div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-error-container"></span> Missed</div>
</div>
</div>
</section>
<!-- Daily Log (Dynamic based on selected day) -->
<section class="w-full max-w-md animate-fade-in-up" id="daily-log">
<h3 class="font-headline-md text-headline-md-mobile text-on-surface mb-stack-sm flex items-center gap-2">
<span class="material-symbols-outlined text-primary">today</span> Today's Log
            </h3>
<div class="space-y-stack-sm">
<!-- Log Item: Taken -->
<div class="glass-card pebble-inner p-stack-md flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-[#E5F5E0] flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-[#2E7D32]">check_circle</span>
</div>
<div class="flex-grow">
<h4 class="font-body-lg text-body-lg text-on-surface">Lisinopril</h4>
<p class="font-body-md text-body-md text-on-surface-variant">10mg • 8:00 AM</p>
</div>
<div class="font-label-sm text-label-sm text-[#2E7D32] bg-[#E5F5E0] px-3 py-1 rounded-full">Taken</div>
</div>
<!-- Log Item: Pending -->
<div class="glass-card pebble-inner p-stack-md flex items-center gap-4 border-l-4 border-primary-container">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary">schedule</span>
</div>
<div class="flex-grow">
<h4 class="font-body-lg text-body-lg text-on-surface">Atorvastatin</h4>
<p class="font-body-md text-body-md text-on-surface-variant">20mg • 8:00 PM</p>
</div>
<button class="bg-primary text-on-primary rounded-full px-4 py-2 font-label-sm text-label-sm hover:opacity-90 transition-opacity shadow-sm">
                        Mark Taken
                    </button>
</div>
</div>
</section>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-end px-4 pb-4 bg-surface-container-lowest/40 dark:bg-surface-dim/40 backdrop-blur-3xl shadow-[0_-10px_40px_rgba(149,73,33,0.05)] rounded-t-xl pb-safe">
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full p-3 shadow-lg transform -translate-y-4 scale-110">
<span class="material-symbols-outlined" data-icon="calendar_today" data-weight="fill" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span class="font-label-sm text-label-sm mt-1">Today</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="lightbulb">lightbulb</span>
<span class="font-label-sm text-label-sm mt-1">Inspire</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="circle">circle</span>
<span class="font-label-sm text-label-sm mt-1">Chat</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="book_2">book_2</span>
<span class="font-label-sm text-label-sm mt-1">Library</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant/70 p-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-label-sm text-label-sm mt-1">Journey</span>
</button>
</nav>
<script>
        function selectDay(element, dayName) {
            // Remove active class from all cells
            document.querySelectorAll('.heatmap-cell').forEach(cell => {
                cell.classList.remove('active');
            });
            // Add active class to clicked cell
            element.classList.add('active');
            
            // Simple logic to change the log title just to show interaction
            const logTitle = document.querySelector('#daily-log h3');
            if(dayName === 'Sat') {
                logTitle.innerHTML = `<span class="material-symbols-outlined text-primary">today</span> Today's Log`;
            } else {
                 logTitle.innerHTML = `<span class="material-symbols-outlined text-primary">history</span> ${dayName}'s Log`;
            }
        }
    </script>
</body></html>
