<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Basic Profile - Suvi</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Lexend:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Theme Configuration -->
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#aecbd9",
                    "on-surface-variant": "#b9cacb",
                    "on-tertiary-fixed-variant": "#2f4a56",
                    "tertiary-fixed": "#cae7f6",
                    "on-tertiary": "#17343f",
                    "surface": "#101415",
                    "outline": "#849495",
                    "error": "#ffb4ab",
                    "on-surface": "#e0e3e5",
                    "on-primary": "#00363a",
                    "surface-bright": "#363a3b",
                    "primary": "#e1fdff",
                    "on-tertiary-fixed": "#001f29",
                    "inverse-primary": "#00696f",
                    "outline-variant": "#3a494b",
                    "surface-container-high": "#272a2c",
                    "surface-dim": "#101415",
                    "inverse-on-surface": "#2d3133",
                    "secondary-container": "#cf5cff",
                    "error-container": "#93000a",
                    "surface-container-highest": "#323537",
                    "on-primary-fixed-variant": "#004f54",
                    "on-secondary": "#520071",
                    "on-background": "#e0e3e5",
                    "surface-container": "#1d2022",
                    "surface-container-low": "#191c1e",
                    "inverse-surface": "#e0e3e5",
                    "secondary-fixed": "#f8d8ff",
                    "on-primary-container": "#006a71",
                    "on-secondary-fixed": "#320047",
                    "surface-tint": "#00dbe7",
                    "on-secondary-container": "#480063",
                    "primary-container": "#00f2ff",
                    "surface-container-lowest": "#0b0f10",
                    "secondary-fixed-dim": "#ecb2ff",
                    "background": "#101415",
                    "surface-variant": "#323537",
                    "on-error": "#690005",
                    "on-primary-fixed": "#002022",
                    "on-secondary-fixed-variant": "#74009f",
                    "on-error-container": "#ffdad6",
                    "primary-fixed": "#74f5ff",
                    "tertiary-container": "#c3e0ee",
                    "on-tertiary-container": "#486470",
                    "secondary": "#ecb2ff",
                    "primary-fixed-dim": "#00dbe7",
                    "tertiary": "#f0f9ff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "container-margin-mobile": "20px",
                    "stack-md": "24px",
                    "unit": "8px",
                    "container-margin-desktop": "40px",
                    "stack-sm": "12px",
                    "stack-lg": "48px"
            },
            "fontFamily": {
                    "display-lg": ["Lexend"],
                    "headline-lg": ["Lexend"],
                    "headline-md": ["Lexend"],
                    "caption": ["Inter"],
                    "headline-lg-mobile": ["Lexend"],

                    "label-md": ["Inter"],

            },
            "fontSize": {

                    "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "500" }],
                    "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],
                    "caption": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                    "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "500" }],
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                    "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                    "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]

          }
        }
      }

<style>
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Organic Movement - Aurora Background */
        .aurora-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .aurora-blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            animation: drift 20s infinite alternate ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; width: 60vw; height: 60vw; background: theme('colors.primary'); animation-delay: 0s; }
        .blob-2 { bottom: -20%; right: -10%; width: 70vw; height: 70vw; background: theme('colors.secondary'); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 30%; width: 50vw; height: 50vw; background: theme('colors.inverse-primary'); animation-delay: -10s; }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* Breathing Orb */
        .suvi-orb {
            box-shadow: 0 0 30px theme('colors.primary/30'), inset 0 0 20px theme('colors.secondary/30');
            animation: breathe 4s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px theme('colors.primary/40'), inset 0 0 15px theme('colors.secondary/40'); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px theme('colors.primary/60'), inset 0 0 25px theme('colors.secondary/60'); }
        }

        /* Glass Plate Input */
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 1px solid transparent;
            border-right: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus-within {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0, 219, 231, 0.15);
            border-top-color: theme('colors.primary');
            border-left-color: theme('colors.primary');
        }

        /* Custom Scrollbar for Dropdowns */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: theme('colors.outline'); border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased font-body-md text-body-md selection:bg-primary/30 selection:text-primary">
<!-- Atmospheric Deep Mesh Background -->
<div class="aurora-bg">
<div class="aurora-blob blob-1"></div>
<div class="aurora-blob blob-2"></div>
<div class="aurora-blob blob-3"></div>
</div>
<!-- TopAppBar (From JSON - Execution) -->
<header class="fixed top-0 left-0 w-full pt-4 backdrop-blur-xl bg-surface/5 flex justify-between items-center px-container-margin-mobile z-50">
<!-- Leading Avatar: Animated breathing orb Suvi avatar -->
<div class="w-10 h-10 rounded-full bg-gradient-to-tr from-primary/80 to-secondary/80 suvi-orb flex items-center justify-center">
<div class="w-8 h-8 rounded-full bg-surface mix-blend-overlay"></div>
</div>
<!-- Headline -->
<h1 class="font-display-lg text-display-lg bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">SUVI</h1>
<!-- Trailing Icon -->
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-300 w-10 h-10 flex items-center justify-end">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 pt-32 pb-40 px-container-margin-mobile md:px-container-margin-desktop max-w-3xl mx-auto flex flex-col min-h-screen">
<!-- Conversational Header -->
<div class="mb-stack-lg animate-fade-in-up">
<div class="w-16 h-16 rounded-full bg-gradient-to-tr from-primary to-secondary suvi-orb mb-stack-md mx-auto md:mx-0 shadow-[0_0_40px_rgba(0,219,231,0.3)]"></div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface text-center md:text-left text-balance">
                Tell me a bit about yourself so I can understand your needs.
            </h2>
</div>
<!-- Glassmorphic Form (Bento Grid inspired) -->
<form class="grid grid-cols-1 md:grid-cols-2 gap-stack-md" onsubmit="event.preventDefault();">
<!-- Name Field (Full Width) -->
<div class="md:col-span-2 flex flex-col group glass-input rounded-xl">
<input class="w-full bg-transparent border-none focus:ring-0 px-6 py-4 text-on-surface font-headline-md text-headline-md placeholder:text-on-surface-variant/30" id="name" placeholder="E.g. Alex" type="text"/>
<label class="px-6 pb-3 text-on-surface-variant font-label-md text-label-md group-focus-within:text-primary transition-colors" for="name">Name</label>
</div>
<!-- Age Field -->
<div class="flex flex-col group glass-input rounded-xl">
<input class="w-full bg-transparent border-none focus:ring-0 px-6 py-4 text-on-surface font-headline-md text-headline-md placeholder:text-on-surface-variant/30" id="age" max="120" min="1" placeholder="25" type="number"/>
<label class="px-6 pb-3 text-on-surface-variant font-label-md text-label-md group-focus-within:text-primary transition-colors" for="age">Age</label>
</div>
<!-- Gender Field -->
<div class="flex flex-col group glass-input rounded-xl relative">
<select class="w-full bg-transparent border-none focus:ring-0 px-6 py-4 text-on-surface font-headline-md text-headline-md appearance-none cursor-pointer" id="gender">
<option class="bg-surface-container text-on-surface-variant/50" disabled="" selected="" value="">Select</option>
<option class="bg-surface-container text-on-surface" value="female">Female</option>
<option class="bg-surface-container text-on-surface" value="male">Male</option>
<option class="bg-surface-container text-on-surface" value="non-binary">Non-binary</option>
<option class="bg-surface-container text-on-surface" value="prefer-not-to-say">Prefer not to say</option>
</select>
<div class="absolute right-6 top-5 pointer-events-none text-primary">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
<label class="px-6 pb-3 text-on-surface-variant font-label-md text-label-md group-focus-within:text-primary transition-colors" for="gender">Gender</label>
</div>
<!-- Height Field -->
<div class="flex flex-col group glass-input rounded-xl relative">
<div class="flex items-end px-6 py-4">
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-on-surface font-headline-md text-headline-md placeholder:text-on-surface-variant/30" id="height" placeholder="170" type="number"/>
<span class="text-on-surface-variant font-body-md text-body-md ml-2 mb-1">cm</span>
</div>
<label class="px-6 pb-3 text-on-surface-variant font-label-md text-label-md group-focus-within:text-primary transition-colors" for="height">Height</label>
</div>
<!-- Weight Field -->
<div class="flex flex-col group glass-input rounded-xl relative">
<div class="flex items-end px-6 py-4">
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-on-surface font-headline-md text-headline-md placeholder:text-on-surface-variant/30" id="weight" placeholder="65" type="number"/>
<span class="text-on-surface-variant font-body-md text-body-md ml-2 mb-1">kg</span>
</div>
<label class="px-6 pb-3 text-on-surface-variant font-label-md text-label-md group-focus-within:text-primary transition-colors" for="weight">Weight</label>
</div>
<!-- Blood Group Field (Full Width on mobile, half on desktop depending on layout) -->
<div class="md:col-span-2 flex flex-col group glass-input rounded-xl relative">
<select class="w-full bg-transparent border-none focus:ring-0 px-6 py-4 text-on-surface font-headline-md text-headline-md appearance-none cursor-pointer" id="blood_group">
<option class="bg-surface-container text-on-surface-variant/50" disabled="" selected="" value="">Select Type</option>
<option class="bg-surface-container text-on-surface" value="A+">A+</option>
<option class="bg-surface-container text-on-surface" value="A-">A-</option>
<option class="bg-surface-container text-on-surface" value="B+">B+</option>
<option class="bg-surface-container text-on-surface" value="B-">B-</option>
<option class="bg-surface-container text-on-surface" value="O+">O+</option>
<option class="bg-surface-container text-on-surface" value="O-">O-</option>
<option class="bg-surface-container text-on-surface" value="AB+">AB+</option>
<option class="bg-surface-container text-on-surface" value="AB-">AB-</option>
<option class="bg-surface-container text-on-surface" value="Unknown">Don't know</option>
</select>
<div class="absolute right-6 top-5 pointer-events-none text-primary">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
<label class="px-6 pb-3 text-on-surface-variant font-label-md text-label-md group-focus-within:text-primary transition-colors" for="blood_group">Blood Group</label>
</div>
</form>
</main>
<!-- Floating Action Button (Next) -->
<div class="fixed bottom-8 left-0 w-full flex justify-center z-50 px-container-margin-mobile pointer-events-none">
<button class="pointer-events-auto flex items-center justify-center gap-2 bg-gradient-to-r from-primary to-secondary text-on-primary font-label-md text-label-md px-10 py-4 rounded-full shadow-[0_0_20px_rgba(0,219,231,0.4)] hover:shadow-[0_0_35px_rgba(207,92,255,0.6)] hover:scale-105 active:scale-95 transition-all duration-500 ease-out">
            Next
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Interaction Script -->
<script>
        // Simple liquid transition effect for the button
        const btn = document.querySelector('button.pointer-events-auto');
        btn.addEventListener('mousemove', (e) => {
            const rect = btn.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            btn.style.setProperty('--x', `${x}px`);
            btn.style.setProperty('--y', `${y}px`);
        });
    </script>
</body></html>
