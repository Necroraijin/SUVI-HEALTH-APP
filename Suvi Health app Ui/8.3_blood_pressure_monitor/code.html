<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Suvi - Blood Pressure Monitor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
        body {
            background-color: theme('colors.background');
            background-image: radial-gradient(at 0% 0%, hsla(28, 100%, 85%, 0.4) 0px, transparent 50%),
                              radial-gradient(at 100% 0%, hsla(12, 100%, 90%, 0.4) 0px, transparent 50%);
            background-attachment: fixed;
        }
        
        /* Soft Tactility Styles */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 30px -5px rgba(255, 219, 204, 0.3), inset 1px 1px 0 0 rgba(255, 255, 255, 0.2), inset -1px -1px 0 0 rgba(0, 0, 0, 0.05);
        }

        .sunset-core {
            background: radial-gradient(circle at center, #FFD2A8 0%, rgba(255, 157, 110, 0.8) 60%, rgba(255, 157, 110, 0.2) 100%);
            box-shadow: 0 0 40px rgba(255, 157, 110, 0.4);
        }

        .chart-line-systolic {
            stroke: theme('colors.primary');
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        .chart-line-diastolic {
            stroke: theme('colors.tertiary');
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .chart-point {
            fill: white;
            stroke-width: 2;
        }

        .chart-point-systolic { stroke: theme('colors.primary'); }
        .chart-point-diastolic { stroke: theme('colors.tertiary'); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background min-h-screen pb-24 md:pb-8 font-body-md antialiased flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/40 dark:bg-black/20 backdrop-blur-3xl border-b border-white/30 shadow-[0_30px_30px_-5px_rgba(255,219,204,0.3)]">
<div class="flex justify-between items-center px-gutter py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full overflow-hidden hover:opacity-80 transition-opacity">
<img alt="User profile photo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAfKqp5im8x0KR01B_06yle-5-Vz7ZnYuIbS4x5Z2HV1XrEY97d7eo1OL5FvRiSRofWuU6fVo3QgL2WwNf66QEOL_t2gAiLsHjrSOLiiCDcaIev_lyXRxyI_Yk-dYs6r7QA2OfxuoJ-Lna4xM-M5xPDWWIR_tiEVezBFg2mHnRV0LsC0vQixUjgjXmop2znysZdx2WReDuZb8n7726cUKb5uBfST5bXzLEp4j2zSD7-jJoO7U0r-iLV17Sa_cVZbZa0Nn5bCGKFf6c"/>
</button>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary dark:text-primary-fixed">Suvi</h1>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow pt-[88px] px-gutter max-w-7xl mx-auto w-full flex flex-col gap-stack-lg md:grid md:grid-cols-12 md:gap-8">
<!-- Header Section -->
<div class="md:col-span-12 flex items-center justify-between mt-stack-md">
<div>
<button class="flex items-center gap-2 text-primary hover:opacity-80 transition-opacity mb-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
<span class="font-label-sm text-label-sm">Back</span>
</button>
<h2 class="font-display-lg text-display-lg text-primary">Blood Pressure</h2>
</div>
</div>
<!-- Latest Reading Core Orb -->
<section class="md:col-span-4 flex justify-center items-center py-stack-lg">
<div class="relative w-64 h-64 rounded-full sunset-core flex flex-col items-center justify-center text-center animate-pulse-slow">
<span class="font-label-sm text-label-sm text-on-primary-fixed-variant tracking-wider uppercase mb-1">Latest Reading</span>
<div class="font-display-lg text-display-lg text-on-primary-fixed">120<span class="text-3xl text-on-primary-fixed-variant/80">/80</span></div>
<span class="font-body-md text-body-md text-on-primary-fixed-variant mt-1">mmHg</span>
<div class="mt-4 bg-white/40 backdrop-blur-md px-4 py-1 rounded-full border border-white/50 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-green-500"></span>
<span class="font-label-sm text-label-sm text-on-surface">Normal</span>
</div>
</div>
</section>
<!-- Insights & Trends Container -->
<div class="md:col-span-8 flex flex-col gap-stack-lg">
<!-- Suvi Pattern Alert -->
<div class="glass-card rounded-2xl p-container-padding flex gap-4 items-start relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/20 rounded-bl-full blur-2xl"></div>
<div class="w-12 h-12 rounded-full bg-primary-container/30 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="auto_awesome">auto_awesome</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Suvi Insight</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Your BP tends to be higher on weekday mornings—worth mentioning to your doctor.</p>
</div>
</div>
<!-- Trend Chart Bento Box -->
<div class="glass-card rounded-2xl p-container-padding flex flex-col gap-4">
<div class="flex justify-between items-end">
<h3 class="font-headline-md text-headline-md text-on-surface">7-Day Trend</h3>
<div class="flex gap-4">
<div class="flex items-center gap-2">
<span class="w-3 h-3 rounded-full bg-primary"></span>
<span class="font-label-sm text-label-sm text-on-surface-variant">SYS</span>
</div>
<div class="flex items-center gap-2">
<span class="w-3 h-3 rounded-full bg-tertiary"></span>
<span class="font-label-sm text-label-sm text-on-surface-variant">DIA</span>
</div>
</div>
</div>
<!-- Fake Chart Area -->
<div class="relative w-full h-48 mt-4 border-l border-b border-outline-variant/30">
<!-- Grid lines -->
<div class="absolute w-full h-full flex flex-col justify-between">
<div class="border-b border-outline-variant/20 w-full h-0 relative"><span class="absolute -left-6 -top-2 font-label-sm text-label-sm text-on-surface-variant text-[10px]">140</span></div>
<div class="border-b border-outline-variant/20 w-full h-0 relative"><span class="absolute -left-6 -top-2 font-label-sm text-label-sm text-on-surface-variant text-[10px]">120</span></div>
<div class="border-b border-outline-variant/20 w-full h-0 relative"><span class="absolute -left-6 -top-2 font-label-sm text-label-sm text-on-surface-variant text-[10px]">100</span></div>
<div class="border-b border-outline-variant/20 w-full h-0 relative"><span class="absolute -left-6 -top-2 font-label-sm text-label-sm text-on-surface-variant text-[10px]">80</span></div>
<div class="w-full h-0 relative"><span class="absolute -left-6 -top-2 font-label-sm text-label-sm text-on-surface-variant text-[10px]">60</span></div>
</div>
<!-- Hypertension markers -->
<div class="absolute top-0 w-full h-1/4 bg-error-container/10 border-b border-error/20 pointer-events-none"></div>
<!-- SVG Chart Lines -->
<svg class="absolute w-full h-full overflow-visible" preserveaspectratio="none" viewbox="0 0 100 100">
<!-- SYS Line -->
<path class="chart-line-systolic" d="M 0,40 L 16,30 L 33,35 L 50,25 L 66,45 L 83,30 L 100,50"></path>
<!-- SYS Points -->
<circle class="chart-point chart-point-systolic" cx="0" cy="40" r="1.5"></circle>
<circle class="chart-point chart-point-systolic" cx="16" cy="30" r="1.5"></circle>
<circle class="chart-point chart-point-systolic" cx="33" cy="35" r="1.5"></circle>
<circle class="chart-point chart-point-systolic" cx="50" cy="25" r="1.5"></circle>
<circle class="chart-point chart-point-systolic" cx="66" cy="45" r="1.5"></circle>
<circle class="chart-point chart-point-systolic" cx="83" cy="30" r="1.5"></circle>
<circle class="chart-point chart-point-systolic" cx="100" cy="50" r="1.5"></circle>
<!-- DIA Line -->
<path class="chart-line-diastolic" d="M 0,70 L 16,65 L 33,75 L 50,60 L 66,80 L 83,65 L 100,75"></path>
<!-- DIA Points -->
<circle class="chart-point chart-point-diastolic" cx="0" cy="70" r="1.5"></circle>
<circle class="chart-point chart-point-diastolic" cx="16" cy="65" r="1.5"></circle>
<circle class="chart-point chart-point-diastolic" cx="33" cy="75" r="1.5"></circle>
<circle class="chart-point chart-point-diastolic" cx="50" cy="60" r="1.5"></circle>
<circle class="chart-point chart-point-diastolic" cx="66" cy="80" r="1.5"></circle>
<circle class="chart-point chart-point-diastolic" cx="83" cy="65" r="1.5"></circle>
<circle class="chart-point chart-point-diastolic" cx="100" cy="75" r="1.5"></circle>
</svg>
<!-- X Axis Labels -->
<div class="absolute -bottom-6 w-full flex justify-between font-label-sm text-label-sm text-on-surface-variant text-[10px]">
<span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4 mt-4">
<button class="flex-1 bg-primary text-on-primary rounded-full py-4 px-6 font-headline-md text-headline-md text-[18px] shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="add">add</span>
                    Add New Log
                </button>
<button class="flex-1 glass-card text-primary rounded-full py-4 px-6 font-headline-md text-headline-md text-[18px] hover:bg-white/50 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="ios_share">ios_share</span>
                    Export for Doctor
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Hidden on md and up, as this is a task-focused screen, nav should arguably be suppressed, but keeping it per instruction structure if considered top-level within health module) -->
<!-- Suppressing Nav based on "Task-Focused" rule: Details screen with back action implies temporary departure. -->
<script>
        // Simple pulse animation for the orb
        const orb = document.querySelector('.sunset-core');
        if(orb) {
            setInterval(() => {
                orb.style.transform = 'scale(1.02)';
                setTimeout(() => {
                    orb.style.transform = 'scale(1)';
                }, 1500);
            }, 3000);
            orb.style.transition = 'transform 1.5s ease-in-out';
        }
    </script>
</body></html>
