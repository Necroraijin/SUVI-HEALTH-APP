<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Aura Gradient Background */
        .bg-aura {
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 218, 214, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 90% 10%, rgba(255, 219, 204, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(254, 199, 199, 0.3) 0%, transparent 60%),
                #fff8f6;
            background-attachment: fixed;
        }

        /* The Sunset Core Orb */
        .sunset-orb {
            background: radial-gradient(circle, #FFD2A8 0%, #ff9d6e 50%, transparent 100%);
            box-shadow: 0 0 40px rgba(255, 157, 110, 0.6);
            animation: breathe 4s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px -5px rgba(149, 73, 33, 0.05);
        }
        
        .glass-card-active {
            background: rgba(255, 237, 231, 0.6);
            border-color: rgba(255, 157, 110, 0.4);
            box-shadow: 0 0 20px rgba(255, 157, 110, 0.15), inset 0 0 10px rgba(255, 255, 255, 0.5);
            transform: scale(0.98);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);

        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-aura text-on-surface min-h-screen antialiased flex flex-col items-center overflow-x-hidden">
<!-- Top Navigation Anchor - Minimal for Flow -->
<header class="w-full max-w-[1200px] flex justify-between items-center px-container-padding py-stack-lg z-50">
<button class="text-on-surface-variant hover:text-primary transition-colors p-2 -ml-2 rounded-full hover:bg-white/20">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="sunset-orb w-10 h-10 rounded-full flex items-center justify-center"></div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md md:max-w-2xl px-container-padding flex flex-col items-center flex-grow pt-stack-md pb-32">
<!-- Header Section -->
<div class="text-center mb-stack-lg space-y-stack-sm w-full">
<h1 class="font-display-lg text-display-lg md:font-headline-lg md:text-headline-lg text-on-surface">
                What brings you here?
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant px-4">
                Select the main goal you'd like us to focus on together.
            </p>
</div>
<!-- Bento Grid for Goals -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-gutter w-full mb-stack-lg">
<!-- Goal Card: Medical -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center gap-stack-sm transition-all duration-300 hover:bg-white/60 aspect-square group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">Medical</span>
</button>
<!-- Goal Card: Report -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center gap-stack-sm transition-all duration-300 hover:bg-white/60 aspect-square group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">description</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">Report</span>
</button>
<!-- Goal Card: Weight -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center gap-stack-sm transition-all duration-300 hover:bg-white/60 aspect-square group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">monitor_weight</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">Weight</span>
</button>
<!-- Goal Card: Fit (Active State Example) -->
<button class="glass-card glass-card-active rounded-2xl p-6 flex flex-col items-center justify-center gap-stack-sm transition-all duration-300 aspect-square relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-primary-container/20 to-transparent pointer-events-none"></div>
<div class="w-12 h-12 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-md z-10">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-semibold z-10">Fit</span>
</button>
<!-- Goal Card: Stress -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center gap-stack-sm transition-all duration-300 hover:bg-white/60 aspect-square group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">self_improvement</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">Stress</span>
</button>
<!-- Goal Card: Health -->
<button class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center gap-stack-sm transition-all duration-300 hover:bg-white/60 aspect-square group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">favorite</span>

</button>

<button class="absolute right-3 p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</main>
<!-- Floating Action Bar - Transactional Context -->
<div class="fixed bottom-0 left-0 right-0 p-container-padding bg-gradient-to-t from-background via-background/80 to-transparent flex justify-center pb-8">
<button class="bg-primary text-on-primary w-full max-w-md py-4 rounded-full font-body-md text-body-md font-medium shadow-[0_10px_25px_-5px_rgba(149,73,33,0.3)] hover:bg-on-primary-fixed transition-all hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
            Continue
            <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<!-- Script to handle simple active state toggling for demonstration -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.grid button.glass-card');
            
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    // Remove active state from all
                    cards.forEach(c => {
                        c.classList.remove('glass-card-active');
                        const iconContainer = c.querySelector('div:first-child');
                        const text = c.querySelector('span:last-child');
                        
                        if(c !== card) {
                            iconContainer.className = 'w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform';
                            text.className = 'font-body-md text-body-md text-on-surface font-medium';
                            
                            // Remove background gradient if it exists
                            const gradient = c.querySelector('.absolute.inset-0');
                            if(gradient) gradient.remove();
                        }
                    });

                    // Add active state to clicked
                    card.classList.add('glass-card-active');
                    
                    const iconContainer = card.querySelector('div:first-child');
                    const text = card.querySelector('span:last-child');
                    
                    // Add gradient element if it doesn't exist
                    if(!card.querySelector('.absolute.inset-0')) {
                        const gradient = document.createElement('div');
                        gradient.className = 'absolute inset-0 bg-gradient-to-tr from-primary-container/20 to-transparent pointer-events-none';
                        card.insertBefore(gradient, card.firstChild);
                    }

                    iconContainer.className = 'w-12 h-12 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-md z-10';
                    text.className = 'font-body-md text-body-md text-on-surface font-semibold z-10';
                });
            });
        });
    </script>
</body></html>
